name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version (e.g. 1.2.3)'
        required: false
        type: string

permissions:
  contents: write
  packages: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  publish:
    name: pack-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore
        run: dotnet restore Texnomic.Curl.Impersonate.slnx

      - name: Build
        run: dotnet build Texnomic.Curl.Impersonate.slnx --configuration Release --no-restore -p:Version=${{ steps.version.outputs.value }}

      - name: Test
        run: dotnet test Texnomic.Curl.Impersonate.slnx --configuration Release --no-build --filter "Category!=E2E"

      - name: Pack
        run: dotnet pack Texnomic.Curl.Impersonate.slnx --configuration Release --no-build --output artifacts -p:Version=${{ steps.version.outputs.value }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: artifacts/*.*nupkg

      - name: Push to NuGet.org
        if: startsWith(github.ref, 'refs/tags/v')
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.*nupkg
          generate_release_notes: true
