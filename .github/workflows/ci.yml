name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build:
    name: build-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, ubuntu-latest ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Texnomic.Curl.Impersonate.slnx

      - name: Build
        run: dotnet build Texnomic.Curl.Impersonate.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Texnomic.Curl.Impersonate.slnx --configuration Release --no-build --filter "Category!=E2E" --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}
          path: '**/TestResults/**/*'
          if-no-files-found: ignore

  pack:
    name: pack
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Pack
        run: dotnet pack Texnomic.Curl.Impersonate.slnx --configuration Release --output artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nupkgs
          path: artifacts/*.*nupkg
